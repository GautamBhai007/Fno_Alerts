name: FnO Alert

on:
  schedule:
    - cron: '55 3 * * 1-5'    # 9:25 AM IST auto alert
    - cron: '*/2 * * * 1-5'   # Every 2 mins on weekdays to check /fno command
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" = "03" ] && [ "$MIN" = "55" ]; then
            python fnoalerts.py scheduled
          else
            python fnoalerts.py listen
          fi
