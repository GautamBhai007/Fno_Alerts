name: FnO Alert

on:
  schedule:
    - cron: '55 3 * * 1-5'   # 9:25 AM IST - scheduled alert
    - cron: '*/1 3-10 * * 1-5'  # Every 1 min (3AM-10AM UTC) to listen for commands
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run Scheduled Alert or Listen
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" = "03" ] && [ "$MIN" = "55" ]; then
            python fnoalerts.py scheduled
          else
            python fnoalerts.py listen
          fi
